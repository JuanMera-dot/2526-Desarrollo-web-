{% extends "base.html" %}

{% block content %}
<style>
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        margin-top: 2rem;
    }
    .login-card {
        background-color: var(--bg-secundario);
        border: 1px solid var(--borde);
        border-top: 4px solid var(--acento);
        border-radius: 12px;
        padding: 3rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        text-align: center;
    }
    .login-card h2 {
        color: var(--texto-claro);
        margin-bottom: 2rem;
        font-size: 1.8rem;
    }
    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--texto-mutado);
        font-size: 0.9rem;
    }
    .form-control {
        width: 100%;
        padding: 12px;
        background-color: var(--bg-principal);
        border: 1px solid var(--borde);
        border-radius: 6px;
        color: var(--texto-claro);
        transition: 0.3s;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--acento);
        box-shadow: 0 0 8px rgba(0, 168, 255, 0.3);
    }
    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: var(--acento);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 1rem;
    }
    .btn-submit:hover {
        background-color: var(--acento-hover);
        box-shadow: 0 0 15px rgba(0, 168, 255, 0.4);
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Acceso al Sistema</h2>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>Usuario o Correo</label>
                <input type="text" name="usuario" class="form-control" placeholder="Ingresa tu correo" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
