{% extends "base.html" %}
{% block content %}
<div class="contenedor">
    <div class="inicio-hero">
        <h2>Catálogo de Soluciones</h2>
        <p class="eslogan">Encuentra los mejores dispositivos para tu hogar inteligente.</p>
    </div>

    <div class="grid-servicios">
        {% for p in productos %}
        <div class="tarjeta-servicio">
            <h4>📦 {{ p.nombre }}</h4>
            <p style="font-size: 1.5rem; color: var(--secondary-color); font-weight: 800;">
                ${{ p.precio }}
            </p>
            <p class="text-muted small">Stock: {{ p.cantidad }} | {{ p.categoria }}</p>
            <button class="btn-contacto" style="padding: 10px 20px; font-size: 0.9rem; border: none;">
                Comprar ahora
            </button>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
