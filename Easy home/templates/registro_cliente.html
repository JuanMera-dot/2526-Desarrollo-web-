{% extends "base.html" %}

{% block content %}
<style>
    .registro-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        margin-top: 2rem;
        margin-bottom: 3rem;
    }
    .registro-card {
        background-color: var(--bg-secundario);
        border: 1px solid var(--borde);
        border-top: 4px solid var(--acento);
        border-radius: 12px;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .registro-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .registro-header h2 {
        color: var(--texto-claro);
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
    }
    .registro-header p {
        color: var(--texto-mutado);
        font-size: 0.95rem;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--texto-claro);
        font-size: 0.9rem;
        font-weight: 500;
    }
    .form-control {
        width: 100%;
        padding: 12px 15px;
        background-color: var(--bg-principal);
        border: 1px solid var(--borde);
        border-radius: 6px;
        color: var(--texto-claro);
        transition: 0.3s;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--acento);
        box-shadow: 0 0 8px rgba(0, 168, 255, 0.3);
    }
    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: var(--acento);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 1rem;
    }
    .btn-submit:hover {
        background-color: var(--acento-hover);
        box-shadow: 0 0 15px rgba(0, 168, 255, 0.4);
    }
    .login-link {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: var(--texto-mutado);
        text-decoration: none;
        font-size: 0.9rem;
        transition: 0.3s;
    }
    .login-link:hover {
        color: var(--acento);
    }
</style>

<div class="registro-wrapper">
    <div class="registro-card">
        <div class="registro-header">
            <h2>Crear Cuenta</h2>
            <p>Únete a Easy Home para contratar expertos en domótica e instalaciones.</p>
        </div>
        
        <form action="{{ url_for('registro_cliente') }}" method="POST">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" class="form-control" placeholder="Ej: Luis Pérez" required>
            </div>
            
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="correo" class="form-control" placeholder="tu@correo.com" required>
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="Crea una contraseña segura" required>
            </div>
            
            <button type="submit" class="btn-submit">Registrarme</button>
        </form>
        
        <a href="{{ url_for('login') }}" class="login-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
    </div>
</div>
{% endblock %}
