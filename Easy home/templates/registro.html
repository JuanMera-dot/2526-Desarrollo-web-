{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0 p-5" style="border-radius: 20px; background: white;">
            <h3 class="text-center fw-bold mb-4" style="color: #1a3a63;">📝 Registro de Experto</h3>
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control bg-light border-0 py-2" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Correo Electrónico</label>
                        <input type="email" name="correo" class="form-control bg-light border-0 py-2" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label small fw-bold text-muted">Contraseña</label>
                        <input type="password" name="password" class="form-control bg-light border-0 py-2" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Especialidad</label>
                        <select name="profesion" class="form-select bg-light border-0 py-2" required>
                            <option value="Carpintero">Carpintero</option>
                            <option value="Electricista">Electricista</option>
                            <option value="Técnico Domótica">Técnico Domótica</option>
                            <option value="Chofer">Chofer</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Ubicación</label>
                        <input type="text" name="ubicacion" class="form-control bg-light border-0 py-2" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label small fw-bold text-muted">Propósito Profesional</label>
                        <textarea name="proposito" class="form-control bg-light border-0" rows="3" required></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-4 py-3 fw-bold shadow-sm" style="border-radius: 12px;">Finalizar Registro</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
