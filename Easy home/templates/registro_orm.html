<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Servicios - Easy Home</title>
</head>
<body>
    <h1>Registrar Nuevo Servicio (Persistencia Múltiple)</h1>
    
    <form action="/registrar_orm" method="POST">
        <label for="nombre">Nombre del Servicio:</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="precio">Precio ($):</label><br>
        <input type="number" step="0.01" id="precio" name="precio" required><br><br>

        <label for="categoria">Categoría (Ej. Limpieza, Plomería):</label><br>
        <input type="text" id="categoria" name="categoria" required><br><br>

        <button type="submit">Guardar en DB y Archivos</button>
    </form>

    <br>
    <a href="/">Volver al Inicio</a> | <a href="/datos">Ver Datos Guardados</a>
</body>
</html>
